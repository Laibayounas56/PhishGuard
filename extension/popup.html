<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      min-height: 280px;
      padding: 18px;
      background: #08111f;
      color: #e5edf7;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(125,178,255,.16);
    }
    .header-icon {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid rgba(6,182,212,.4);
      border-radius: 8px;
      color: #d7f8ff;
      font-weight: 800;
    }
    .header-title { font-weight: 800; font-size: 1.05rem; }
    .header-sub { color: #8ba0b8; font-size: .75rem; }
    .no-data {
      padding: 26px 0;
      color: #8ba0b8;
      font-size: .9rem;
      line-height: 1.45;
      text-align: center;
    }
    .result-card {
      margin-bottom: 14px;
      padding: 16px;
      border: 1px solid rgba(125,178,255,.14);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .78rem;
      font-weight: 800;
    }
    .badge-safe { border: 1px solid rgba(16,185,129,.35); background: rgba(16,185,129,.14); color: #48e3aa; }
    .badge-suspicious { border: 1px solid rgba(245,158,11,.35); background: rgba(245,158,11,.14); color: #ffd166; }
    .badge-blocked { border: 1px solid rgba(239,68,68,.35); background: rgba(239,68,68,.14); color: #ff8a8a; }
    .score-num { font-size: 1.1rem; font-weight: 800; }
    .score-num.safe { color: #48e3aa; }
    .score-num.suspicious { color: #ffd166; }
    .score-num.blocked { color: #ff8a8a; }
    .score-track {
      height: 7px;
      margin-bottom: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
    }
    .score-fill { height: 100%; border-radius: inherit; transition: width .6s ease; }
    .fill-safe { background: linear-gradient(90deg,#10b981,#4ade80); }
    .fill-suspicious { background: linear-gradient(90deg,#f59e0b,#fde047); }
    .fill-blocked { background: linear-gradient(90deg,#ef4444,#fb7185); }
    .url-text {
      color: #8ba0b8;
      font-size: .76rem;
      line-height: 1.4;
      word-break: break-all;
    }
    .time-text {
      margin-top: 6px;
      color: #52657c;
      font-size: .72rem;
    }
    .open-btn {
      display: block;
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: #fff;
      font-size: .9rem;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
    }
    .settings {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(125,178,255,.16);
    }
    .settings label {
      color: #8ba0b8;
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
    }
    .settings-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }
    .settings input {
      min-width: 0;
      border: 1px solid rgba(125,178,255,.2);
      border-radius: 8px;
      background: rgba(255,255,255,.045);
      color: #e5edf7;
      font: inherit;
      font-size: .78rem;
      padding: 9px 10px;
    }
    .settings button {
      border: 0;
      border-radius: 8px;
      background: rgba(125,178,255,.16);
      color: #dbeafe;
      cursor: pointer;
      font: inherit;
      font-size: .78rem;
      font-weight: 800;
      padding: 9px 10px;
    }
    .save-state {
      min-height: 16px;
      color: #48e3aa;
      font-size: .72rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">PG</span>
    <div>
      <div class="header-title">PhishGuard</div>
      <div class="header-sub">Last scanned URL</div>
    </div>
  </div>

  <div id="content">
    <div class="no-data">No URL scanned yet.<br />Navigate to a website to scan it.</div>
  </div>

  <a id="open-link" class="open-btn" href="http://localhost:3000" target="_blank">Open PhishGuard</a>
  <div class="settings">
    <label for="api-url">Backend API</label>
    <div class="settings-row">
      <input id="api-url" type="url" />
      <button id="save-api-url" type="button">Save</button>
    </div>
    <div id="save-state" class="save-state" aria-live="polite"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
